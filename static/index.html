<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>指令拆解 · Instruction Break-Down</title>

<style>
  :root {
    --bg: #f4f5fb;
    --card: #ffffff;
    --ink: #1c2033;
    --muted: #6b7089;
    --line: #e6e8f2;
    --accent: #5b5bd6;
    --accent-soft: #eeeefc;
    --ok: #1a9e6e;
    --warn: #b57e10;
    --warn-bg: #fdf6e7;
    --bad: #d14343;
    --bad-bg: #fdf0f0;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", "PingFang SC", "Hiragino Sans GB",
                 "Microsoft YaHei", sans-serif;
    background:
      radial-gradient(1000px 500px at 15% -10%, #e6e6fb 0%, transparent 60%),
      radial-gradient(900px 450px at 90% 0%, #e3f0ec 0%, transparent 55%),
      var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }
  .wrap { max-width: 780px; margin: 0 auto; padding: 48px 20px 80px; }

  header { text-align: center; margin-bottom: 36px; }
  .logo {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 28px; font-weight: 700; letter-spacing: 1px;
  }
  .logo .mark {
    width: 40px; height: 40px; border-radius: 12px;
    background: linear-gradient(135deg, #6a6af0, #4747c2);
    color: #fff; display: inline-flex; align-items: center; justify-content: center;
    font-size: 20px; box-shadow: 0 6px 16px rgba(91, 91, 214, .35);
  }
  header p { color: var(--muted); margin-top: 10px; font-size: 14.5px; }

  .panel {
    background: var(--card); border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: 0 10px 30px rgba(28, 32, 51, .06);
    padding: 22px;
  }

  .provider-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap;
  }
  .provider-row .label { font-size: 13px; color: var(--muted); margin-right: 2px; }
  .pill {
    border: 1px solid var(--line); background: #fafbff; color: var(--muted);
    padding: 6px 14px; border-radius: 999px; font-size: 13px; cursor: pointer;
    transition: all .15s ease;
  }
  .pill:hover { border-color: var(--accent); color: var(--accent); }
  .pill.active {
    background: var(--accent); border-color: var(--accent); color: #fff;
    box-shadow: 0 4px 10px rgba(91, 91, 214, .3);
  }

  .input-row { display: flex; gap: 10px; }
  #instruction {
    flex: 1; font-size: 16px; padding: 13px 16px;
    border: 1.5px solid var(--line); border-radius: 10px; outline: none;
    font-family: inherit; color: var(--ink); background: #fcfcff;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  #instruction:focus {
    border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft);
  }
  #submit {
    padding: 0 26px; font-size: 15.5px; font-weight: 600; color: #fff;
    background: linear-gradient(135deg, #6a6af0, #4f4fce);
    border: none; border-radius: 10px; cursor: pointer; font-family: inherit;
    display: inline-flex; align-items: center; gap: 8px;
    transition: transform .1s ease, box-shadow .15s ease;
    box-shadow: 0 5px 14px rgba(91, 91, 214, .3);
  }
  #submit:hover:not(:disabled) { transform: translateY(-1px); }
  #submit:disabled { opacity: .65; cursor: not-allowed; }
  .spinner {
    width: 15px; height: 15px; border-radius: 50%;
    border: 2px solid rgba(255, 255, 255, .4); border-top-color: #fff;
    animation: spin .7s linear infinite; display: none;
  }
  #submit.loading .spinner { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .examples { margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .examples .label { font-size: 12.5px; color: var(--muted); }
  .chip {
    font-size: 12.5px; color: var(--accent); background: var(--accent-soft);
    border: none; padding: 5px 11px; border-radius: 999px; cursor: pointer;
    font-family: inherit; transition: all .15s ease;
  }
  .chip:hover { background: #e0e0fa; }
  .chip.warn { color: var(--warn); background: var(--warn-bg); }
  .chip.bad  { color: var(--bad);  background: var(--bad-bg); }

  #result { margin-top: 26px; }
  .fade-in { animation: fade .3s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

  .result-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; gap: 10px; flex-wrap: wrap;
  }
  .result-head .q { font-size: 15px; font-weight: 600; }
  .result-head .q span { color: var(--muted); font-weight: 400; }
  .meta { font-size: 12px; color: var(--muted); }

  .steps { position: relative; }
  .step {
    display: flex; gap: 14px; padding: 12px 0; position: relative;
  }
  .step:not(:last-child)::before {
    content: ""; position: absolute; left: 15px; top: 44px; bottom: -12px;
    width: 2px; background: var(--line);
  }
  .step .num {
    flex: none; width: 32px; height: 32px; border-radius: 50%;
    background: var(--accent-soft); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; margin-top: 2px; z-index: 1;
  }
  .step .body { flex: 1; min-width: 0; }
  .step .zh { font-size: 15.5px; font-weight: 600; }
  .step .en { font-size: 13px; color: var(--muted); margin-top: 3px; }
  .step .tags { margin-top: 7px; display: flex; gap: 6px; flex-wrap: wrap; }
  .tag {
    font-size: 11.5px; padding: 2.5px 9px; border-radius: 6px;
    background: #f2f3f9; color: var(--muted); border: 1px solid var(--line);
  }
  .tag.action { background: var(--accent-soft); color: var(--accent); border-color: transparent; font-weight: 600; }

  .banner {
    border-radius: 10px; padding: 14px 16px; font-size: 14.5px; line-height: 1.65;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .banner .icon { font-size: 17px; margin-top: 1px; }
  .banner.warn { background: var(--warn-bg); color: var(--warn); border: 1px solid #f3e3bd; }
  .banner.bad  { background: var(--bad-bg);  color: var(--bad);  border: 1px solid #f5cfcf; }
  .banner strong { display: block; margin-bottom: 2px; }

  /* —— 操作库 —— */
  #ops { margin-top: 44px; }
  .ops-head { display: flex; align-items: baseline; gap: 10px; margin: 26px 0 14px; }
  .ops-head h2 { font-size: 18px; }
  .ops-head .count {
    font-size: 12px; color: var(--accent); background: var(--accent-soft);
    padding: 2px 10px; border-radius: 999px; font-weight: 600;
  }
  .ops-head .sub { font-size: 12.5px; color: var(--muted); }
  .ops-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
    gap: 12px;
  }
  .op-card {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px 16px; transition: box-shadow .15s ease, transform .15s ease;
  }
  .op-card:hover { box-shadow: 0 8px 20px rgba(28,32,51,.08); transform: translateY(-1px); }
  .op-card .head { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .op-card .oid {
    font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 12px;
    font-weight: 700; color: var(--accent); background: var(--accent-soft);
    padding: 2px 8px; border-radius: 6px;
  }
  .op-card.expert .oid { color: #b3560e; background: #fdeee0; }
  .op-card .zh-name { font-size: 15.5px; font-weight: 700; }
  .op-card .en-name { font-size: 12.5px; color: var(--muted); }
  .op-card .len {
    margin-left: auto; font-size: 11.5px; color: var(--muted);
    border: 1px solid var(--line); border-radius: 999px; padding: 1px 8px;
  }
  .op-card .logic { margin-top: 9px; font-size: 13px; line-height: 1.5; }
  .op-card .logic .ln { color: var(--muted); font-size: 11px; font-family: ui-monospace, Consolas, monospace; }
  .op-card .logic .lzh { font-weight: 500; }
  .op-card .logic .len2 { color: var(--muted); font-size: 12px; }
  .op-card .coef, .op-card .cats { margin-top: 8px; font-size: 12px; color: var(--muted); line-height: 1.7; }
  .op-card .cats .tag, .op-card .coef .tag { margin: 1px 2px 1px 0; display: inline-block; }

  footer { text-align: center; margin-top: 44px; font-size: 12px; color: #a0a4b8; }
</style>
<style>
  :root {
    --navy: #172033;
    --blue: #4f62e9;
    --blue-soft: #eef1ff;
    --green: #14865f;
    --green-soft: #e9f8f1;
    --red: #c83f52;
    --red-soft: #fff0f2;
    --amber: #b97912;
    --amber-soft: #fff7e8;
    --surface: rgba(255,255,255,.92);
    --shadow: 0 18px 50px rgba(31,39,72,.09);
  }
  body { overflow-x: hidden; }
  .app-shell { min-height: 100vh; display: grid; grid-template-columns: 330px minmax(0,1fr); }
  .library {
    position: sticky; top: 0; height: 100vh; z-index: 20; overflow: hidden;
    background: rgba(248,249,255,.96); border-right: 1px solid var(--line);
    backdrop-filter: blur(18px); display: flex; flex-direction: column;
    transition: width .22s ease, transform .22s ease;
  }
  .library-head { padding: 24px 20px 16px; border-bottom: 1px solid var(--line); }
  .library-title { display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .library-title strong { font-size: 16px; }
  .library-title span { color: var(--muted); font-size:12px; }
  .icon-btn { width:34px; height:34px; border:1px solid var(--line); background:#fff; border-radius:9px; cursor:pointer; color:var(--muted); }
  .search-box { margin-top:14px; position:relative; }
  .search-box input { width:100%; border:1px solid var(--line); border-radius:9px; padding:9px 12px 9px 34px; outline:none; font:inherit; font-size:13px; }
  .search-box input:focus { border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-soft); }
  .search-box::before { content:"⌕"; position:absolute; left:12px; top:7px; color:var(--muted); }
  #ops { margin:0; padding:12px 14px 30px; overflow-y:auto; flex:1; }
  .op-group { border-bottom:1px solid var(--line); padding-bottom:8px; }
  .op-group > summary { list-style:none; display:flex; align-items:center; gap:8px; padding:11px 4px; cursor:pointer; font-size:13px; font-weight:700; }
  .op-group > summary::-webkit-details-marker { display:none; }
  .op-group > summary::after { content:"⌄"; margin-left:auto; color:var(--muted); transition:transform .15s; }
  .op-group:not([open]) > summary::after { transform:rotate(-90deg); }
  .op-count { font-size:11px; color:var(--blue); background:var(--blue-soft); border-radius:999px; padding:2px 7px; }
  .op-item { background:#fff; border:1px solid var(--line); border-radius:10px; margin:7px 0; overflow:hidden; }
  .op-item summary { padding:10px 11px; display:grid; grid-template-columns:auto 1fr auto; gap:8px; align-items:center; list-style:none; cursor:pointer; }
  .op-item summary::-webkit-details-marker { display:none; }
  .op-item .oid { font:700 10.5px ui-monospace,Consolas,monospace; color:var(--blue); background:var(--blue-soft); padding:3px 6px; border-radius:5px; }
  .op-item.expert .oid { color:#ad5b17; background:#fff0e3; }
  .op-item .op-name { min-width:0; font-size:13px; font-weight:650; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .op-item .op-en { font-size:10.5px; color:var(--muted); }
  .op-detail { border-top:1px solid var(--line); padding:9px 11px; font-size:11.5px; color:var(--muted); line-height:1.6; }
  .op-detail b { color:var(--ink); font-weight:600; }
  .op-detail .tag { margin:3px 2px 0 0; display:inline-block; font-size:10.5px; }
  .library.collapsed { width:72px; }
  .library.collapsed .library-copy, .library.collapsed .search-box, .library.collapsed #ops { display:none; }
  .app-shell.library-collapsed { grid-template-columns:72px minmax(0,1fr); }
  .main-area { min-width:0; transition:margin-left .22s ease; }
  .main-wrap { max-width:1180px; margin:0 auto; padding:34px 32px 70px; }
  .topbar { display:flex; align-items:center; justify-content:space-between; gap:20px; margin-bottom:24px; }
  .brand { display:flex; align-items:center; gap:12px; }
  .brand-mark { width:42px; height:42px; border-radius:13px; color:#fff; background:linear-gradient(135deg,#6678f3,#4053d5); display:grid; place-items:center; box-shadow:0 8px 20px rgba(79,98,233,.28); font-weight:800; }
  .brand h1 { font-size:21px; letter-spacing:.2px; }
  .brand p { color:var(--muted); font-size:12.5px; margin-top:3px; }
  .connection { display:flex; align-items:center; gap:7px; color:var(--muted); font-size:12px; }
  .connection-dot { width:8px; height:8px; border-radius:50%; background:#a5a9ba; }
  .connection.live .connection-dot { background:var(--green); box-shadow:0 0 0 4px var(--green-soft); }
  .connection.wait .connection-dot { background:var(--amber); }
  .input-panel { padding:18px; background:var(--surface); }
  .provider-row { margin-bottom:12px; }
  .input-row #submit { min-height:48px; }
  .session-lock { display:none; color:var(--amber); font-size:12px; margin-top:10px; }
  .input-panel.locked .session-lock { display:block; }
  #result { margin-top:22px; }
  .empty-state { min-height:330px; border:1px dashed #cdd2e6; border-radius:16px; display:grid; place-items:center; text-align:center; color:var(--muted); background:rgba(255,255,255,.42); padding:30px; }
  .empty-state .empty-icon { font-size:34px; margin-bottom:10px; opacity:.7; }
  .execution-head { background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:17px 20px; box-shadow:var(--shadow); }
  .execution-top { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; }
  .execution-title .eyebrow { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:1px; }
  .execution-title h2 { font-size:18px; margin-top:5px; }
  .state-pill { font-size:11.5px; font-weight:700; border-radius:999px; padding:5px 10px; background:var(--blue-soft); color:var(--blue); }
  .state-pill.running { background:var(--amber-soft); color:var(--amber); }
  .state-pill.completed { background:var(--green-soft); color:var(--green); }
  .state-pill.paused,.state-pill.terminated { background:var(--red-soft); color:var(--red); }
  .progress-row { display:flex; align-items:center; gap:12px; margin-top:14px; }
  .progress-track { flex:1; height:7px; background:#edf0f7; border-radius:999px; overflow:hidden; }
  .progress-bar { height:100%; border-radius:inherit; background:linear-gradient(90deg,#5266e9,#20a77b); transition:width .25s ease; }
  .progress-copy { color:var(--muted); font-size:11.5px; white-space:nowrap; }
  .execution-grid { display:grid; grid-template-columns:minmax(0,1.5fr) minmax(300px,.8fr); gap:18px; margin-top:18px; align-items:start; }
  .chain-card,.monitor-card,.log-card { background:var(--surface); border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow); }
  .card-heading { padding:16px 18px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; }
  .card-heading h3 { font-size:14px; }
  .card-heading span { color:var(--muted); font-size:11.5px; }
  .execution-steps { padding:8px 18px 15px; }
  .execution-step { display:grid; grid-template-columns:38px minmax(0,1fr); gap:12px; padding:12px 0; position:relative; }
  .execution-step:not(:last-child)::after { content:""; position:absolute; left:18px; top:48px; bottom:-12px; width:2px; background:var(--line); }
  .step-dot { width:36px; height:36px; border-radius:12px; display:grid; place-items:center; background:#f0f2f7; color:#8a90a6; font-weight:750; font-size:12px; z-index:1; border:2px solid transparent; transition:.2s; }
  .execution-step.active .step-dot { color:var(--blue); background:var(--blue-soft); border-color:#aeb7ff; box-shadow:0 0 0 5px rgba(79,98,233,.08); }
  .execution-step.succeeded .step-dot { color:#fff; background:var(--green); }
  .execution-step.blocked .step-dot { color:#fff; background:var(--red); }
  .execution-step.succeeded:not(:last-child)::after { background:var(--green); }
  .step-main { padding-top:1px; min-width:0; }
  .step-title { display:flex; gap:8px; align-items:center; flex-wrap:wrap; font-size:14px; font-weight:650; }
  .step-title .current-label { font-size:10px; color:var(--blue); background:var(--blue-soft); border-radius:999px; padding:2px 7px; }
  .step-en { color:var(--muted); font-size:11.5px; margin-top:3px; }
  .step-tags { margin-top:6px; }
  .attempts { display:flex; gap:4px; margin-top:7px; flex-wrap:wrap; }
  .attempt-chip { font-size:10px; color:var(--muted); background:#f2f3f7; border-radius:5px; padding:2px 6px; }
  .attempt-chip.success { color:var(--green); background:var(--green-soft); }
  .attempt-chip.failure,.attempt-chip.timeout { color:var(--red); background:var(--red-soft); }
  .attempt-chip.waiting { color:var(--amber); background:var(--amber-soft); }
  .monitor-card { position:sticky; top:18px; overflow:hidden; }
  .monitor-body { padding:20px; text-align:center; }
  .monitor-kicker { font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }
  .timer-ring { --timer-angle:360deg; width:112px; height:112px; border-radius:50%; margin:16px auto; display:grid; place-items:center; background:conic-gradient(var(--blue) var(--timer-angle),#e9ebf3 0); position:relative; }
  .timer-ring::before { content:""; position:absolute; inset:8px; background:#fff; border-radius:50%; }
  .timer-copy { position:relative; z-index:1; }
  .timer-copy strong { display:block; font-size:29px; line-height:1; }
  .timer-copy span { display:block; color:var(--muted); font-size:10px; margin-top:4px; }
  .monitor-action { font-size:16px; font-weight:700; margin-top:4px; }
  .monitor-sub { color:var(--muted); font-size:11.5px; margin-top:5px; line-height:1.5; }
  .monitor-slots { display:flex; flex-wrap:wrap; justify-content:center; gap:5px; margin:12px 0; }
  .monitor-buttons { display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-top:15px; }
  .control-btn { min-height:42px; border-radius:9px; border:1px solid var(--line); background:#fff; font:650 13px inherit; cursor:pointer; transition:.15s; }
  .control-btn:hover:not(:disabled) { transform:translateY(-1px); box-shadow:0 5px 12px rgba(28,32,51,.08); }
  .control-btn:disabled { opacity:.5; cursor:wait; }
  .control-btn.success { color:#fff; background:var(--green); border-color:var(--green); }
  .control-btn.failure { color:var(--red); background:var(--red-soft); border-color:#f2c5cc; }
  .control-btn.primary { color:#fff; background:var(--blue); border-color:var(--blue); grid-column:1/-1; }
  .control-btn.danger { color:var(--red); }
  .monitor-note { color:var(--muted); font-size:10.5px; margin-top:12px; }
  .log-card { margin-top:18px; overflow:hidden; }
  .log-card summary { cursor:pointer; list-style:none; }
  .event-list { max-height:260px; overflow:auto; border-top:1px solid var(--line); padding:7px 18px 14px; }
  .event-row { display:grid; grid-template-columns:70px 1fr; gap:10px; padding:8px 0; border-bottom:1px solid #f0f1f6; font-size:11.5px; }
  .event-time { color:var(--muted); font-variant-numeric:tabular-nums; }
  .event-text b { font-weight:650; }
  .event-source { display:inline-block; margin-left:5px; font-size:9.5px; color:var(--muted); background:#f0f1f5; border-radius:4px; padding:1px 4px; }
  .notice { padding:15px 17px; border-radius:12px; background:var(--amber-soft); border:1px solid #f1dfb9; color:var(--amber); font-size:13px; line-height:1.55; }
  .notice.bad { color:var(--red); background:var(--red-soft); border-color:#f2cbd1; }
  .mobile-library-btn { display:none; }
  .scrim { display:none; }
  @media (max-width: 980px) {
    .app-shell { display:block; }
    .library { position:fixed; width:320px; transform:translateX(-105%); box-shadow:20px 0 45px rgba(20,25,44,.15); }
    .library.open { transform:translateX(0); }
    .library.collapsed { width:320px; }
    .library.collapsed .library-copy,.library.collapsed .search-box,.library.collapsed #ops { display:block; }
    .main-area { margin-left:0; }
    .mobile-library-btn { display:inline-grid; place-items:center; }
    .scrim.open { display:block; position:fixed; inset:0; background:rgba(19,24,40,.35); z-index:15; }
    .execution-grid { grid-template-columns:1fr; }
    .monitor-card { position:static; }
  }
  @media (max-width: 620px) {
    .main-wrap { padding:20px 14px 50px; }
    .topbar { align-items:flex-start; }
    .brand p { display:none; }
    .input-row { flex-direction:column; }
    #submit { padding:13px; justify-content:center; }
    .examples { display:none; }
    .execution-top { flex-direction:column; }
    .execution-grid { gap:12px; }
    .monitor-buttons { grid-template-columns:1fr; }
    .control-btn.primary { grid-column:auto; }
  }
</style>
</head>
<body>
<div class="app-shell">
  <aside class="library" id="library">
    <div class="library-head">
      <div class="library-title">
        <div class="library-copy"><strong>操作能力库</strong><br><span>Atomic & Expert Primitives</span></div>
        <button class="icon-btn" id="closeLibrary" title="折叠侧栏">⇤</button>
      </div>
      <div class="search-box"><input id="opSearch" type="search" placeholder="搜索操作名称或编号"></div>
    </div>
    <section id="ops"><span class="meta">正在加载操作库…</span></section>
  </aside>
  <div class="scrim" id="scrim"></div>

  <main class="main-area">
    <div class="main-wrap">
      <div class="topbar">
        <div class="brand">
          <button class="icon-btn mobile-library-btn" id="openLibrary" title="打开操作库">☰</button>
          <span class="brand-mark">IB</span>
          <div><h1>Instruction Break-Down</h1><p>Planner · Orchestrator · Monitor 执行闭环</p></div>
        </div>
        <div class="connection wait" id="connection"><span class="connection-dot"></span><span>等待执行会话</span></div>
      </div>

      <section class="panel input-panel" id="inputPanel">
        <div class="provider-row" id="providerRow"><span class="label">模型提供商</span></div>
        <div class="input-row">
          <input id="instruction" type="text" placeholder="例如：把水壶放到桌子上" autocomplete="off">
          <button id="submit"><span class="spinner"></span><span id="submitText">生成执行计划</span></button>
        </div>
        <div class="examples">
          <span class="label">快速示例：</span>
          <button class="chip" data-i="把水壶放到桌子上">水壶放到桌上</button>
          <button class="chip" data-i="把牛奶放进冰箱">牛奶放进冰箱</button>
          <button class="chip" data-i="用抹布擦桌子">擦拭桌面</button>
          <button class="chip warn" data-i="把水壶放到那边">不明确指令</button>
        </div>
        <div class="session-lock">当前执行会话尚未结束。请先完成或终止任务，再生成新计划。</div>
      </section>

      <section id="result"><div class="empty-state"><div><div class="empty-icon">◎</div><strong>还没有执行计划</strong><p>输入指令后，planner 会生成可监控的原子操作链。</p></div></div></section>
    </div>
  </main>
</div>

<script src="/app.js"></script>
</body>
</html>
